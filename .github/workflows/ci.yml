name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    name: flake eval (instantiation)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: fragment evaluates
        run: nix eval .#registryFragment --apply builtins.attrNames
      - name: anowaw instantiates (no build)
        run: |
          nix eval --raw .#packages.aarch64-darwin.anowaw-macos.drvPath
          nix eval --raw .#packages.aarch64-darwin.anowaw-ios.drvPath

  abi-anchors:
    name: verify C ABI anchors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: verify ABI anchors present
        run: python3 .github/scripts/verify-anowaw-abi.py

  build:
    name: build anowaw (macOS)
    runs-on: macos-15
    needs: [eval, abi-anchors]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix build .#packages.aarch64-darwin.anowaw-macos -L
